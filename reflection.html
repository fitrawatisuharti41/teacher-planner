<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Refleksi — Teacher Planner</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="topnav">
  <div class="row gap-3">
    <svg class="icon icon-lg" style="color:var(--color-accent-blue)"><use href="assets/icons/icons.svg#icon-book"/></svg>
    <strong>Teacher Planner</strong>
  </div>
  <div class="row gap-3">
    <button class="theme-toggle" id="themeToggle" aria-label="Ganti tema">
      <svg class="icon"><use href="assets/icons/icons.svg#icon-sun"/></svg>
    </button>
    <button class="btn btn-ghost" id="btnLogout">Keluar</button>
  </div>
</div>

<div class="layout-with-sidebar container" style="padding-block: var(--space-6);">

  <nav class="sidebar stack gap-2" aria-label="Navigasi utama">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Lipat sidebar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M15 6l-6 6 6 6"/></svg></button>
    <a class="row gap-2 btn btn-ghost" href="dashboard.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-chart"/></svg> <span class="nav-label">Dashboard</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="calendar.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-calendar"/></svg> <span class="nav-label">Kalender</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="lesson-planner.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-book"/></svg> <span class="nav-label">Lesson Planner</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="todo.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-check"/></svg> <span class="nav-label">To-do</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="classes.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-folder"/></svg> <span class="nav-label">Kelas</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="students.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-user"/></svg> <span class="nav-label">Siswa</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="assessment.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-award"/></svg> <span class="nav-label">Penilaian</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="resources.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-archive"/></svg> <span class="nav-label">Arsip &amp; Administrasi</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="bank-soal.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-note"/></svg> <span class="nav-label">Bank Soal</span>
    </a>
    <a class="row gap-2 btn btn-primary" href="reflection.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-note"/></svg> <span class="nav-label">Refleksi</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="wali-kelas.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-user"/></svg> <span class="nav-label">Wali Kelas</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="settings.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-gear"/></svg> <span class="nav-label">Pengaturan</span>
    </a>
  </nav>

  <main class="content stack gap-6" style="padding-inline: var(--space-6);">

    <div class="row gap-3" style="justify-content:space-between;">
      <h1>Refleksi Mengajar</h1>
      <button class="btn btn-primary" id="btnNewReflection">+ Refleksi Baru</button>
    </div>

    <div class="card row gap-3">
      <select class="input" id="filterTipe" style="max-width:200px;">
        <option value="">Semua Tipe</option>
        <option value="harian">Harian</option>
        <option value="mingguan">Mingguan</option>
        <option value="semester">Semester</option>
      </select>
    </div>

    <section class="card" id="reflectionFormPanel" style="display:none;">
      <h3 id="reflectionFormTitle">Refleksi Baru</h3>
      <form class="stack gap-4" id="reflectionForm">
        <div class="row gap-4" style="flex-wrap:wrap;">
          <div class="stack gap-1" style="flex:1; min-width:140px;">
            <label class="text-sm text-muted" for="rTipe">Tipe</label>
            <select class="input" id="rTipe" required>
              <option value="harian">Harian</option>
              <option value="mingguan">Mingguan</option>
              <option value="semester">Semester</option>
            </select>
          </div>
          <div class="stack gap-1" style="flex:1; min-width:140px;">
            <label class="text-sm text-muted" for="rTanggal">Tanggal</label>
            <input class="input" id="rTanggal" type="date" required>
          </div>
          <div class="stack gap-1" style="flex:1; min-width:140px;">
            <label class="text-sm text-muted" for="rRating">Rating</label>
            <select class="input" id="rRating">
              <option value="5">⭐⭐⭐⭐⭐</option>
              <option value="4">⭐⭐⭐⭐</option>
              <option value="3">⭐⭐⭐</option>
              <option value="2">⭐⭐</option>
              <option value="1">⭐</option>
            </select>
          </div>
        </div>
        <div class="stack gap-1">
          <label class="text-sm text-muted" for="rKonten">Catatan Refleksi</label>
          <textarea class="input" id="rKonten" rows="5" placeholder="Apa yang berhasil, tantangan, dan rencana perbaikan..." required></textarea>
        </div>
        <div class="row gap-2" style="justify-content:flex-end;">
          <button type="button" class="btn btn-secondary" id="btnCancelReflection">Batal</button>
          <button type="submit" class="btn btn-primary">Simpan</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h3>Riwayat Refleksi</h3>
      <div class="stack gap-4" id="reflectionList"></div>
    </section>

  </main>
</div>

<script type="module" src="js/reflection.js"></script>
</body>
</html>
