<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kelas &amp; Mapel — Teacher Planner</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="topnav">
  <div class="row gap-3">
    <svg class="icon icon-lg" style="color:var(--color-accent-blue)"><use href="assets/icons/icons.svg#icon-book"/></svg>
    <strong>Teacher Planner</strong>
  </div>
  <div class="row gap-3">
    <button class="theme-toggle" id="themeToggle" aria-label="Ganti tema">
      <svg class="icon"><use href="assets/icons/icons.svg#icon-sun"/></svg>
    </button>
    <button class="btn btn-ghost" id="btnLogout">Keluar</button>
  </div>
</div>

<div class="layout-with-sidebar container" style="padding-block: var(--space-6);">

  <nav class="sidebar stack gap-2" aria-label="Navigasi utama">
    <a class="row gap-2 btn btn-ghost" href="dashboard.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-chart"/></svg> Dashboard
    </a>
    <a class="row gap-2 btn btn-ghost" href="calendar.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-calendar"/></svg> Kalender
    </a>
    <a class="row gap-2 btn btn-ghost" href="lesson-planner.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-book"/></svg> Lesson Planner
    </a>
    <a class="row gap-2 btn btn-ghost" href="todo.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-check"/></svg> To-do
    </a>
    <a class="row gap-2 btn btn-primary" href="classes.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-folder"/></svg> Kelas
    </a>
    <a class="row gap-2 btn btn-ghost" href="students.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-user"/></svg> Siswa
    </a>
    <a class="row gap-2 btn btn-ghost" href="assessment.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-award"/></svg> Penilaian
    </a>
    <a class="row gap-2 btn btn-ghost" href="resources.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-archive"/></svg> Arsip &amp; Administrasi
    </a>
    <a class="row gap-2 btn btn-ghost" href="reflection.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-note"/></svg> Refleksi
    </a>
    <a class="row gap-2 btn btn-ghost" href="settings.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-gear"/></svg> Pengaturan
    </a>
  </nav>

  <main class="content stack gap-6" style="padding-inline: var(--space-6);">

    <div class="row gap-3" style="justify-content:space-between;">
      <h1>Kelas &amp; Mapel</h1>
      <button class="btn btn-primary" id="btnNewClass">
        <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-folder"/></svg> Kelas Baru
      </button>
    </div>

    <!-- Form tambah kelas -->
    <section class="card" id="classFormPanel" style="display:none;">
      <h3>Kelas Baru</h3>
      <form class="row gap-4" id="classForm" style="flex-wrap:wrap; align-items:flex-end;">
        <div class="stack gap-1" style="flex:1; min-width:140px;">
          <label class="text-sm text-muted" for="fNamaKelas">Nama Kelas</label>
          <input class="input" id="fNamaKelas" type="text" placeholder="Misal: 7A" required>
        </div>
        <div class="stack gap-1" style="flex:1; min-width:140px;">
          <label class="text-sm text-muted" for="fTingkat">Tingkat</label>
          <select class="input" id="fTingkat" required>
            <option value="7">7</option>
            <option value="8">8</option>
          </select>
        </div>
        <div class="row gap-2">
          <button type="button" class="btn btn-secondary" id="btnCancelClass">Batal</button>
          <button type="submit" class="btn btn-primary">Simpan</button>
        </div>
      </form>
    </section>

    <!-- List kelas -->
    <section class="card">
      <h3>Daftar Kelas</h3>
      <div class="stack gap-3" id="classList"></div>
    </section>

    <!-- Penugasan mengajar -->
    <section class="card">
      <div class="row gap-3" style="justify-content:space-between;">
        <h3>Penugasan Mengajar</h3>
        <button class="btn btn-secondary" id="btnNewAssignment">+ Tambah Penugasan</button>
      </div>
      <p class="text-sm text-muted">Mapel mana yang kamu ajar di kelas mana.</p>

      <form class="row gap-4" id="assignmentForm" style="flex-wrap:wrap; align-items:flex-end; display:none; margin-bottom:var(--space-4);">
        <div class="stack gap-1" style="flex:1; min-width:140px;">
          <label class="text-sm text-muted" for="aKelas">Kelas</label>
          <select class="input" id="aKelas" required></select>
        </div>
        <div class="stack gap-1" style="flex:1; min-width:140px;">
          <label class="text-sm text-muted" for="aMapel">Mata Pelajaran</label>
          <select class="input" id="aMapel" required>
            <option>IPA</option>
            <option>Prakarya</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">Tambah</button>
      </form>

      <div class="stack gap-3" id="assignmentList"></div>
    </section>

  </main>
</div>

<script type="module" src="js/classes.js"></script>
</body>
</html>
