<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arsip Materi — Portal Siswa &amp; Orang Tua</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/responsive.css">
<style>
  body { display:flex; justify-content:center; min-height:100vh; padding: var(--space-8) var(--space-4); }
  .portal-shell { width:100%; max-width:560px; }
  .thumb { width:56px; height:56px; border-radius: var(--radius-sm); background: var(--color-accent-blue-soft);
    display:flex; align-items:center; justify-content:center; flex-shrink:0; }
</style>
</head>
<body>

<div class="portal-shell stack gap-6">
  <div class="row gap-3" style="justify-content:space-between;">
    <div>
      <strong id="namaSiswa"></strong>
      <div class="text-sm text-muted">Kelas <span id="kelasSiswa"></span></div>
    </div>
    <button class="btn btn-ghost" id="btnBackToMenu">← Menu</button>
  </div>

  <section class="card">
    <h3>📗 IPA</h3>
    <p class="text-xs text-muted" style="margin-top:-4px;">File</p>
    <div class="stack gap-3" id="ipaFileList"></div>
    <p class="text-xs text-muted" style="margin-top:var(--space-3);">Video</p>
    <div class="stack gap-3" id="ipaVideoList"></div>
  </section>

  <section class="card">
    <h3>🧵 Prakarya</h3>
    <p class="text-xs text-muted" style="margin-top:-4px;">File</p>
    <div class="stack gap-3" id="prakaryaFileList"></div>
    <p class="text-xs text-muted" style="margin-top:var(--space-3);">Video</p>
    <div class="stack gap-3" id="prakaryaVideoList"></div>
  </section>
</div>

<script type="module">
  import { supabase } from '../js/config/supabase.js';

  document.getElementById('btnBackToMenu')?.addEventListener('click', () => {
    sessionStorage.clear();
    window.location.href = 'index.html';
  });

  const studentId = sessionStorage.getItem('portalStudentId');
  const nama = sessionStorage.getItem('portalNama');
  const kelasNama = sessionStorage.getItem('portalKelasNama');

  if (!studentId) {
    window.location.href = 'index.html';
  } else {
    document.getElementById('namaSiswa').textContent = nama;
    document.getElementById('kelasSiswa').textContent = kelasNama;

    const { data, error } = await supabase
      .from('resources')
      .select('judul, tipe, url, mapel_umum')
      .is('kategori', null)
      .order('created_at', { ascending: false });

    if (error) {
      console.error(error.message);
    } else {
      const renderItem = (r) => `
          <a class="row gap-3" href="${r.url || '#'}" target="_blank" rel="noopener" style="text-decoration:none; color:inherit;">
            <div class="thumb"><svg class="icon" style="color:var(--color-accent-blue)"><use href="../assets/icons/icons.svg#${r.tipe === 'video' ? 'icon-book' : 'icon-archive'}"/></svg></div>
            <div>
              <strong class="text-sm">${r.judul}</strong>
              <div class="text-xs text-muted">${r.tipe.toUpperCase()}</div>
            </div>
          </a>`;

      const renderGroup = (elId, list) => {
        document.getElementById(elId).innerHTML = list.length
          ? list.map(renderItem).join('')
          : '<p class="text-sm text-muted">Belum ada.</p>';
      };

      const byMapel = (mapel) => data.filter((r) => r.mapel_umum === mapel);
      const ipa = byMapel('IPA');
      const prakarya = byMapel('Prakarya');

      renderGroup('ipaFileList', ipa.filter((r) => r.tipe !== 'video'));
      renderGroup('ipaVideoList', ipa.filter((r) => r.tipe === 'video'));
      renderGroup('prakaryaFileList', prakarya.filter((r) => r.tipe !== 'video'));
      renderGroup('prakaryaVideoList', prakarya.filter((r) => r.tipe === 'video'));
    }
  }
</script>
</body>
</html>
