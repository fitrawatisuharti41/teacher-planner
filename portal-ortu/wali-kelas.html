<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wali Kelas — Portal Siswa &amp; Orang Tua</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/responsive.css">
<style>
  body { display:flex; justify-content:center; min-height:100vh; padding: var(--space-8) var(--space-4); }
  .portal-shell { width:100%; max-width:560px; }
  .tab-bar { display:flex; gap: var(--space-2); flex-wrap:wrap; border-bottom:1px solid var(--color-line); padding-bottom: var(--space-3); }
  .tab-btn { background:transparent; border:none; padding: var(--space-2) var(--space-3); border-radius: var(--radius-sm);
    font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--color-ink-muted); cursor:pointer; }
  .tab-btn.is-active { background: var(--color-accent-blue-soft); color: var(--color-accent-blue); }
  .tab-panel { display:none; }
  .tab-panel.is-active { display:block; }
  .avatar { width:72px; height:72px; border-radius:50%; background: var(--color-accent-blue-soft);
    display:flex; align-items:center; justify-content:center; margin-inline:auto; overflow:hidden; }
  .avatar img { width:100%; height:100%; object-fit:cover; }
</style>
</head>
<body>

<div class="portal-shell stack gap-6">

  <div class="row gap-3" style="justify-content:space-between;">
    <div>
      <strong>Wali Kelas</strong>
      <div class="text-sm text-muted" id="kelasLabel"></div>
    </div>
    <button class="btn btn-ghost" id="btnBackToMenu">← Menu</button>
  </div>

  <div id="noWaliMessage" class="card" style="display:none;">
    <p class="text-sm text-muted">Kelas ini belum ada wali kelas yang terdaftar.</p>
  </div>

  <div id="waliContent" class="stack gap-6" style="display:none;">

    <div class="tab-bar">
      <button class="tab-btn is-active" data-tab="kontak">Kontak</button>
      <button class="tab-btn" data-tab="dashboard">Dashboard Kelas</button>
      <button class="tab-btn" data-tab="agenda">Agenda Kelas</button>
      <button class="tab-btn" data-tab="prestasi">Prestasi &amp; Pelanggaran</button>
      <button class="tab-btn" data-tab="komunikasi">Komunikasi Ortu</button>
      <button class="tab-btn" data-tab="catatan">Catatan Pribadi</button>
      <button class="tab-btn" data-tab="administrasi">Administrasi</button>
    </div>

    <div class="tab-panel is-active" id="panel-kontak">
      <section class="card stack gap-4" style="text-align:center;">
        <div class="avatar" id="avatar">
          <svg class="icon icon-lg" style="color:var(--color-accent-blue)"><use href="../assets/icons/icons.svg#icon-user"/></svg>
        </div>
        <div>
          <h2 id="namaGuru" style="margin-bottom:2px;">–</h2>
          <p class="text-sm text-muted" id="jabatanGuru" style="margin:0;">–</p>
          <p class="text-sm text-muted" id="sekolahGuru" style="margin:0;">–</p>
        </div>
        <a class="btn btn-primary" id="btnWhatsapp" href="#" target="_blank" rel="noopener" style="display:none;">💬 Hubungi via WhatsApp</a>
      </section>
    </div>

    <div class="tab-panel" id="panel-dashboard">
      <div class="grid-cards" style="grid-template-columns: repeat(2, 1fr);">
        <div class="card stack" style="align-items:center; text-align:center;">
          <div id="ringKehadiran"></div>
          <div class="stat-label">Kehadiran Kelas</div>
        </div>
        <div class="card card-stat">
          <div class="stat-icon c-purple"><svg class="icon"><use href="../assets/icons/icons.svg#icon-chart"/></svg></div>
          <div class="stat-value" id="statRataNilai">–</div><div class="stat-label">Rata-rata Nilai Kelas</div>
        </div>
        <div class="card card-stat">
          <div class="stat-icon c-green"><svg class="icon"><use href="../assets/icons/icons.svg#icon-award"/></svg></div>
          <div class="stat-value" id="statPrestasi">–</div><div class="stat-label">Total Prestasi Kelas</div>
        </div>
        <div class="card card-stat">
          <div class="stat-icon c-danger"><svg class="icon"><use href="../assets/icons/icons.svg#icon-note"/></svg></div>
          <div class="stat-value" id="statPelanggaran">–</div><div class="stat-label">Total Pelanggaran Kelas</div>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="panel-agenda">
      <section class="card">
        <h3>Agenda Kelas</h3>
        <div class="stack gap-3" id="agendaList" style="margin-top:var(--space-4);"></div>
      </section>
    </div>

    <div class="tab-panel" id="panel-prestasi">
      <section class="card">
        <h3>Prestasi &amp; Pelanggaran — <span id="namaAnakPrestasi"></span></h3>
        <div class="stack gap-3" id="prestasiList" style="margin-top:var(--space-4);"></div>
      </section>
    </div>

    <div class="tab-panel" id="panel-komunikasi">
      <section class="card">
        <h3>Komunikasi Ortu — <span id="namaAnakKomunikasi"></span></h3>
        <div class="stack gap-3" id="komunikasiList" style="margin-top:var(--space-4);"></div>
      </section>
    </div>

    <div class="tab-panel" id="panel-catatan">
      <section class="card">
        <h3>Catatan Pribadi — <span id="namaAnakCatatan"></span></h3>
        <div class="stack gap-3" id="catatanList" style="margin-top:var(--space-4);"></div>
      </section>
    </div>

    <div class="tab-panel" id="panel-administrasi">
      <section class="card">
        <h3>Administrasi Kelas</h3>
        <div class="stack gap-3" id="adminDocList" style="margin-top:var(--space-4);"></div>
      </section>
    </div>

  </div>
</div>

<script type="module">
  import { supabase } from '../js/config/supabase.js';
  import { renderProgressRing } from '../js/utils.js';

  document.getElementById('btnBackToMenu')?.addEventListener('click', () => {
    sessionStorage.clear();
    window.location.href = 'index.html';
  });

  const studentId = sessionStorage.getItem('portalStudentId');
  const nama = sessionStorage.getItem('portalNama');
  if (!studentId) window.location.href = 'index.html';

  document.querySelectorAll('.tab-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach((b) => b.classList.remove('is-active'));
      document.querySelectorAll('.tab-panel').forEach((p) => p.classList.remove('is-active'));
      btn.classList.add('is-active');
      document.getElementById(`panel-${btn.dataset.tab}`).classList.add('is-active');
    });
  });

  ['namaAnakPrestasi', 'namaAnakKomunikasi', 'namaAnakCatatan'].forEach((id) => {
    document.getElementById(id).textContent = nama;
  });

  const { data: studentRow } = await supabase.from('students_public').select('class_id').eq('id', studentId).maybeSingle();
  const classId = studentRow?.class_id;

  const { data: kelas } = await supabase.from('classes').select('nama_kelas, wali_kelas_id').eq('id', classId).maybeSingle();
  document.getElementById('kelasLabel').textContent = kelas ? `Kelas ${kelas.nama_kelas}` : '';

  if (!kelas?.wali_kelas_id) {
    document.getElementById('noWaliMessage').style.display = 'block';
  } else {
    document.getElementById('waliContent').style.display = 'block';

    // --- Kontak ---
    const { data: guru } = await supabase
      .from('teachers_public')
      .select('nama_lengkap, jabatan, sekolah_nama, kontak_whatsapp, foto_url')
      .eq('id', kelas.wali_kelas_id)
      .maybeSingle();

    if (guru) {
      document.getElementById('namaGuru').textContent = guru.nama_lengkap;
      document.getElementById('jabatanGuru').textContent = guru.jabatan || '';
      document.getElementById('sekolahGuru').textContent = guru.sekolah_nama || '';
      if (guru.foto_url) document.getElementById('avatar').innerHTML = `<img src="${guru.foto_url}" alt="${guru.nama_lengkap}">`;
      if (guru.kontak_whatsapp) {
        const nomor = guru.kontak_whatsapp.replace(/[^0-9]/g, '').replace(/^0/, '62');
        const btn = document.getElementById('btnWhatsapp');
        btn.href = `https://wa.me/${nomor}`;
        btn.style.display = 'inline-flex';
      }
    }

    // --- Dashboard Kelas (agregat, aman ditampilkan) ---
    const { data: summary } = await supabase
      .from('class_development_summary')
      .select('persentase_kehadiran, rata_rata_nilai, jumlah_prestasi, jumlah_pelanggaran')
      .eq('class_id', classId)
      .maybeSingle();

    renderProgressRing(document.getElementById('ringKehadiran'), Math.round(summary?.persentase_kehadiran || 0));
    document.getElementById('statRataNilai').textContent = summary?.rata_rata_nilai ?? '–';
    document.getElementById('statPrestasi').textContent = summary?.jumlah_prestasi ?? 0;
    document.getElementById('statPelanggaran').textContent = summary?.jumlah_pelanggaran ?? 0;

    // --- Agenda Kelas (kelas-wide, bukan data pribadi siswa) ---
    const { data: agenda } = await supabase
      .from('class_agenda')
      .select('tanggal, judul, deskripsi')
      .eq('class_id', classId)
      .order('tanggal', { ascending: false });

    document.getElementById('agendaList').innerHTML = (agenda || []).length
      ? agenda.map((a) => `
          <div class="row gap-3" style="justify-content:space-between;">
            <span class="text-sm">${a.judul}${a.deskripsi ? ' · ' + a.deskripsi : ''}</span>
            <span class="text-sm text-muted">${a.tanggal}</span>
          </div>`).join('')
      : '<p class="text-sm text-muted">Belum ada agenda.</p>';

    // --- Prestasi & Pelanggaran: HANYA anak ini ---
    const { data: prestasi } = await supabase
      .from('student_achievements')
      .select('tipe, judul, deskripsi, tanggal')
      .eq('student_id', studentId)
      .order('tanggal', { ascending: false });

    document.getElementById('prestasiList').innerHTML = (prestasi || []).length
      ? prestasi.map((p) => `
          <div class="row gap-3" style="justify-content:space-between;">
            <div>
              <span class="badge ${p.tipe === 'prestasi' ? 'badge-success' : 'badge-danger'}">${p.tipe}</span>
              <strong style="margin-left:var(--space-2);">${p.judul}</strong>
              <div class="text-sm text-muted">${p.tanggal}${p.deskripsi ? ' · ' + p.deskripsi : ''}</div>
            </div>
          </div>`).join('')
      : '<p class="text-sm text-muted">Belum ada catatan.</p>';

    // --- Komunikasi Ortu: HANYA anak ini ---
    const { data: komunikasi } = await supabase
      .from('parent_communications')
      .select('metode, ringkasan, tanggal')
      .eq('student_id', studentId)
      .order('tanggal', { ascending: false });

    document.getElementById('komunikasiList').innerHTML = (komunikasi || []).length
      ? komunikasi.map((k) => `
          <div class="row gap-3" style="justify-content:space-between;">
            <span class="text-sm">${k.tanggal} · ${k.ringkasan}</span>
            <span class="badge badge-info">${k.metode || '-'}</span>
          </div>`).join('')
      : '<p class="text-sm text-muted">Belum ada catatan komunikasi.</p>';

    // --- Catatan Pribadi: HANYA anak ini ---
    const { data: catatan } = await supabase
      .from('student_private_notes')
      .select('tanggal, catatan')
      .eq('student_id', studentId)
      .order('tanggal', { ascending: false });

    document.getElementById('catatanList').innerHTML = (catatan || []).length
      ? catatan.map((c) => `
          <div>
            <span class="text-sm text-muted">${c.tanggal}</span>
            <p class="text-sm" style="margin:var(--space-1) 0 var(--space-3);">${c.catatan}</p>
          </div>`).join('')
      : '<p class="text-sm text-muted">Belum ada catatan pribadi.</p>';

    // --- Administrasi Kelas (kelas-wide) ---
    const { data: adminDocs } = await supabase
      .from('homeroom_documents')
      .select('judul, kategori, url')
      .eq('class_id', classId)
      .order('created_at', { ascending: false });

    document.getElementById('adminDocList').innerHTML = (adminDocs || []).length
      ? adminDocs.map((d) => `
          <div class="row gap-3" style="justify-content:space-between;">
            <span class="text-sm">${d.kategori ? `<span class="badge badge-info">${d.kategori}</span> ` : ''}${d.judul}</span>
            ${d.url ? `<a class="btn btn-ghost" href="${d.url}" target="_blank" rel="noopener">Buka</a>` : ''}
          </div>`).join('')
      : '<p class="text-sm text-muted">Belum ada dokumen.</p>';
  }
</script>
</body>
</html>
