<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kalender — Teacher Planner</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/responsive.css">
<style>
  .month-grid { display:grid; grid-template-columns: repeat(7, 1fr); gap: var(--space-2); }
  .day-name { text-align:center; font-size:var(--text-xs); color:var(--color-ink-muted); font-weight:var(--weight-semibold); padding-block: var(--space-1); }
  .day-cell {
    min-height:80px; border-radius: var(--radius-sm); border:1px solid var(--color-line);
    padding: var(--space-2); cursor:pointer; transition: background-color var(--duration-fast) var(--ease-standard);
  }
  .day-cell:hover { background: var(--color-surface-alt); }
  .day-cell.is-today { border-color: var(--color-accent-blue); border-width:2px; }
  .day-cell.is-outside { opacity: 0.35; }
  .day-number { font-size: var(--text-sm); font-weight: var(--weight-semibold); }
  .event-dot { width:6px; height:6px; border-radius:50%; display:inline-block; margin-right:2px; }
</style>
</head>
<body>

<div class="topnav">
  <div class="row gap-3">
    <svg class="icon icon-lg" style="color:var(--color-accent-blue)"><use href="assets/icons/icons.svg#icon-book"/></svg>
    <strong>Teacher Planner</strong>
  </div>
  <div class="row gap-3">
    <button class="theme-toggle" id="themeToggle" aria-label="Ganti tema">
      <svg class="icon"><use href="assets/icons/icons.svg#icon-sun"/></svg>
    </button>
    <button class="btn btn-ghost" id="btnLogout">Keluar</button>
  </div>
</div>

<div class="layout-with-sidebar container" style="padding-block: var(--space-6);">

  <nav class="sidebar stack gap-2" aria-label="Navigasi utama">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Lipat sidebar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M15 6l-6 6 6 6"/></svg></button>
    <a class="row gap-2 btn btn-ghost" href="dashboard.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-chart"/></svg> <span class="nav-label">Dashboard</span>
    </a>
    <a class="row gap-2 btn btn-primary" href="calendar.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-calendar"/></svg> <span class="nav-label">Kalender</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="lesson-planner.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-book"/></svg> <span class="nav-label">Lesson Planner</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="todo.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-check"/></svg> <span class="nav-label">To-do</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="classes.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-folder"/></svg> <span class="nav-label">Kelas</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="students.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-user"/></svg> <span class="nav-label">Siswa</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="assessment.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-award"/></svg> <span class="nav-label">Penilaian</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="resources.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-archive"/></svg> <span class="nav-label">Arsip &amp; Administrasi</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="bank-soal.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-note"/></svg> <span class="nav-label">Bank Soal</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="reflection.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-note"/></svg> <span class="nav-label">Refleksi</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="wali-kelas.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-user"/></svg> <span class="nav-label">Wali Kelas</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="settings.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-gear"/></svg> <span class="nav-label">Pengaturan</span>
    </a>
  </nav>

  <main class="content stack gap-6" style="padding-inline: var(--space-6);">

    <div class="row gap-3" style="justify-content:space-between;">
      <div class="row gap-3">
        <button class="btn btn-secondary" id="btnPrevMonth">‹</button>
        <h1 id="monthLabel" style="min-width:200px; text-align:center;"></h1>
        <button class="btn btn-secondary" id="btnNextMonth">›</button>
      </div>
      <button class="btn btn-primary" id="btnNewEvent">+ Event Baru</button>
    </div>

    <section class="card" id="eventFormPanel" style="display:none;">
      <h3 id="eventFormTitle">Event Baru</h3>
      <form class="stack gap-4" id="eventForm">
        <div class="stack gap-1">
          <label class="text-sm text-muted" for="eJudul">Judul</label>
          <input class="input" id="eJudul" type="text" required>
        </div>
        <div class="row gap-4" style="flex-wrap:wrap;">
          <div class="stack gap-1" style="flex:1; min-width:160px;">
            <label class="text-sm text-muted" for="eTanggal">Tanggal</label>
            <input class="input" id="eTanggal" type="date" required>
          </div>
          <div class="stack gap-1" style="flex:1; min-width:120px;">
            <label class="text-sm text-muted" for="eJam">Jam</label>
            <input class="input" id="eJam" type="time" value="07:00">
          </div>
          <div class="stack gap-1" style="flex:1; min-width:140px;">
            <label class="text-sm text-muted" for="eWarna">Label Warna</label>
            <select class="input" id="eWarna">
              <option value="blue">Biru</option>
              <option value="green">Hijau</option>
              <option value="warning">Kuning</option>
              <option value="danger">Merah</option>
            </select>
          </div>
        </div>
        <label class="row gap-2 text-sm">
          <input type="checkbox" id="eReminder"> Ingatkan saya
        </label>
        <div class="row gap-2" style="justify-content:flex-end;">
          <button type="button" class="btn btn-ghost" id="btnDeleteEvent" style="display:none;">Hapus</button>
          <button type="button" class="btn btn-secondary" id="btnCancelEvent">Batal</button>
          <button type="submit" class="btn btn-primary">Simpan</button>
        </div>
      </form>
    </section>

    <section class="card">
      <div class="month-grid" id="dayNames"></div>
      <div class="month-grid" id="monthGrid" style="margin-top:var(--space-2);"></div>
    </section>

  </main>
</div>

<script type="module" src="js/calendar.js"></script>
</body>
</html>
