<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Absensi — Teacher Planner</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/responsive.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div class="topnav">
  <div class="row gap-3">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Lipat sidebar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
    <svg class="icon icon-lg" style="color:var(--color-accent-blue)"><use href="assets/icons/icons.svg#icon-book"/></svg>
    <strong>Teacher Planner</strong>
  </div>
  <div class="row gap-3">
    <button class="theme-toggle" id="themeToggle" aria-label="Ganti tema">
      <svg class="icon"><use href="assets/icons/icons.svg#icon-sun"/></svg>
    </button>
    <button class="btn btn-ghost" id="btnLogout">Keluar</button>
  </div>
</div>

<div class="layout-with-sidebar container" style="padding-block: var(--space-6);">

  <nav class="sidebar stack gap-2" aria-label="Navigasi utama">
    <a class="row gap-2 btn btn-ghost" href="dashboard.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-chart"/></svg> <span class="nav-label">Dashboard</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="calendar.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-calendar"/></svg> <span class="nav-label">Kalender</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="lesson-planner.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-book"/></svg> <span class="nav-label">Lesson Planner</span>
    </a>
    <a class="row gap-2 btn btn-primary" href="absensi.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-check"/></svg> <span class="nav-label">Absensi</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="todo.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-check"/></svg> <span class="nav-label">To-do</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="classes.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-folder"/></svg> <span class="nav-label">Kelas</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="students.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-user"/></svg> <span class="nav-label">Siswa</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="assessment.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-award"/></svg> <span class="nav-label">Penilaian</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="resources.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-archive"/></svg> <span class="nav-label">Arsip &amp; Administrasi</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="bank-soal.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-note"/></svg> <span class="nav-label">Bank Soal</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="reflection.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-note"/></svg> <span class="nav-label">Refleksi</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="wali-kelas.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-user"/></svg> <span class="nav-label">Wali Kelas</span>
    </a>
    <a class="row gap-2 btn btn-ghost" href="settings.html">
      <svg class="icon icon-sm"><use href="assets/icons/icons.svg#icon-gear"/></svg> <span class="nav-label">Pengaturan</span>
    </a>
  </nav>

  <main class="content stack gap-6" style="padding-inline: var(--space-6);">

    <h1>Absensi</h1>

    <div class="card row gap-4" style="flex-wrap:wrap; align-items:flex-end;">
      <div class="stack gap-1" style="flex:1; min-width:180px;">
        <label class="text-sm text-muted" for="absKelas">Kelas</label>
        <select class="input" id="absKelas"></select>
      </div>
      <div class="stack gap-1" style="flex:1; min-width:160px;">
        <label class="text-sm text-muted" for="absTanggal">Tanggal</label>
        <input class="input" id="absTanggal" type="date">
      </div>
      <button class="btn btn-secondary" id="btnTandaiHadirSemua">Tandai Semua Hadir</button>
      <button class="btn btn-primary" id="btnSimpanAbsensi">Simpan Absensi</button>
    </div>

    <div class="stack gap-2" id="absensiList"></div>

    <!-- Rekap Absensi (per rentang tanggal) + Download Excel -->
    <section class="card">
      <h3>Rekap Absensi</h3>
      <div class="row gap-4" style="flex-wrap:wrap; align-items:flex-end; margin-top:var(--space-4);">
        <div class="stack gap-1" style="flex:1; min-width:160px;">
          <label class="text-sm text-muted" for="rekapAbsKelas">Kelas</label>
          <select class="input" id="rekapAbsKelas"></select>
        </div>
        <div class="stack gap-1" style="flex:1; min-width:150px;">
          <label class="text-sm text-muted" for="rekapAbsDari">Dari Tanggal</label>
          <input class="input" id="rekapAbsDari" type="date">
        </div>
        <div class="stack gap-1" style="flex:1; min-width:150px;">
          <label class="text-sm text-muted" for="rekapAbsSampai">Sampai Tanggal</label>
          <input class="input" id="rekapAbsSampai" type="date">
        </div>
        <button class="btn btn-secondary" id="btnMuatRekapAbsensi">Tampilkan</button>
        <button class="btn btn-primary" id="btnExportAbsensiExcel">⬇ Download Excel</button>
      </div>
      <p class="text-sm text-muted" style="margin-top:var(--space-2);">Kolom = tiap tanggal dalam rentang, plus rekap total per status di kolom terakhir.</p>
      <div style="overflow-x:auto; margin-top:var(--space-4);">
        <table id="rekapAbsensiTable" style="width:100%; border-collapse:collapse; font-size:var(--text-sm);"></table>
      </div>
    </section>

  </main>
</div>

<script type="module" src="js/absensi.js"></script>
</body>
</html>
